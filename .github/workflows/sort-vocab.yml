name: Sort "other" vocab into topics

on:
  push:
    branches: [main]
    paths:
      - '*/vocabulary/topics/other.json'

# Prevent the bot's own commits from re-triggering this workflow
concurrency:
  group: sort-vocab-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sort:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can detect which files changed
          fetch-depth: 2

      - name: Detect changed language
        id: detect
        run: |
          # Find which language's other.json changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'vocabulary/topics/other\.json' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No other.json changed — nothing to do."
            echo "lang=" >> "$GITHUB_OUTPUT"
          else
            LANG=$(echo "$CHANGED" | cut -d'/' -f1)
            echo "Detected changed language: $LANG"
            echo "lang=$LANG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.detect.outputs.lang != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.detect.outputs.lang != ''
        run: pip install requests

      - name: Sort other.json
        if: steps.detect.outputs.lang != ''
        env:
          # GH_MODELS_TOKEN must be a GitHub PAT stored in repo Settings → Secrets → Actions.
          # The auto-generated GITHUB_TOKEN is NOT accepted by the GitHub Models API (401).
          # Create one at: https://github.com/settings/tokens (no extra scopes needed for free tier).
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::GH_MODELS_TOKEN secret is not set. Go to Settings → Secrets → Actions and add it."
            echo "::error::Create a PAT at https://github.com/settings/tokens (no extra scopes needed)"
            exit 1
          fi
          python scripts/sort_other.py --lang ${{ steps.detect.outputs.lang }}

      - name: Commit sorted words
        if: steps.detect.outputs.lang != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LANG=${{ steps.detect.outputs.lang }}

          # Fetch latest remote changes BEFORE committing to avoid rebase conflicts.
          # words_index.json is a generated file — we merge first, then regenerate it
          # fresh so there is never a JSON conflict to resolve manually.
          git fetch origin main
          git merge origin/main --no-edit -X ours

          # Regenerate the index to ensure it is consistent with all topic files
          # (including any new files that arrived via the merge above).
          python scripts/rebuild_index.py

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit — other.json was already empty or fully sorted."
          else
            git commit -m "chore(${LANG}): auto-sort other.json into topics [skip ci]

          Sorted by sort_other.py using GitHub Models (gpt-4o-mini).
          
          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

            # Push with retry: if another commit sneaked in between fetch and push,
            # pull + regenerate + amend rather than rebasing (avoids conflict loops).
            for attempt in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt ${attempt}."
                break
              fi
              echo "Push rejected (attempt ${attempt}) — pulling and retrying..."
              git pull --no-rebase -X ours --no-edit origin main
              python scripts/rebuild_index.py
              git add -A
              git diff --cached --quiet || git commit --amend --no-edit
            done
          fi
