name: Generate vocabulary

on:
  workflow_dispatch:
    inputs:
      lang:
        description: Language
        required: true
        type: choice
        options:
          - french
          - russian
          - chinese
      topic:
        description: Topic slug (e.g. travel, food, emotions)
        required: true
        type: string
      count:
        description: Number of words to generate
        required: true
        default: "20"
        type: string
      cefr_level:
        description: CEFR level
        required: true
        type: choice
        options:
          - A2
          - B2
          - C1

concurrency:
  group: generate-vocab-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate vocabulary
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          INPUT_LANG: ${{ inputs.lang }}
          INPUT_TOPIC: ${{ inputs.topic }}
          INPUT_COUNT: ${{ inputs.count }}
          INPUT_CEFR_LEVEL: ${{ inputs.cefr_level }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::GH_MODELS_TOKEN secret is not set."
            exit 1
          fi

          python scripts/generate_vocab.py \
            --lang "$INPUT_LANG" \
            --topic "$INPUT_TOPIC" \
            --count "$INPUT_COUNT" \
            --cefr-level "$INPUT_CEFR_LEVEL"

      - name: Rebuild index
        run: python scripts/rebuild_index.py

      - name: Commit generated vocabulary
        env:
          INPUT_LANG: ${{ inputs.lang }}
          INPUT_TOPIC: ${{ inputs.topic }}
          INPUT_CEFR_LEVEL: ${{ inputs.cefr_level }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No new vocabulary generated — nothing to commit."
          else
            git commit -m "chore($INPUT_LANG): generate $INPUT_TOPIC vocab ($INPUT_CEFR_LEVEL) [skip ci]

          Generated by generate_vocab.py using GitHub Models (gpt-4o-mini).

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push
            echo "✅ Pushed generated vocabulary"
          fi
