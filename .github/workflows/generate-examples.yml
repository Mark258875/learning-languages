name: Generate example sentences

on:
  # Run weekly on Monday mornings
  schedule:
    - cron: '0 6 * * 1'

  # Run when vocabulary files change — but only if enough words lack examples
  push:
    branches: [main]
    paths:
      - '*/vocabulary/topics/*.json'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      lang:
        description: 'Language to process (blank = all)'
        required: false
        type: choice
        options:
          - ''
          - french
          - russian
          - chinese
      batch_size:
        description: 'Max words per language'
        required: false
        default: '20'

# Prevent concurrent runs
concurrency:
  group: generate-examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Skip bot commits to avoid infinite loops
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if examples are needed
        id: check
        run: |
          # Count entries missing examples
          MISSING=$(python3 -c "
          import json, glob
          count = 0
          for f in glob.glob('*/vocabulary/topics/*.json'):
              try:
                  data = json.loads(open(f).read())
              except: continue
              if not isinstance(data, list): continue
              for e in data:
                  if not e.get('example'): count += 1
          print(count)
          ")
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
          echo "📊 Found $MISSING entries without examples"

          # For push events, only proceed if at least 5 words lack examples
          # (avoids running on every single commit)
          if [ "${{ github.event_name }}" = "push" ] && [ "$MISSING" -lt 5 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Only $MISSING missing — skipping (threshold: 5)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.missing != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.missing != '0'
        run: pip install requests

      - name: Generate examples
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.missing != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::GH_MODELS_TOKEN secret is not set."
            exit 1
          fi

          LANG_ARG=""
          BATCH_ARG="--batch 20"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.lang }}" ]; then
              LANG_ARG="--lang ${{ inputs.lang }}"
            fi
            if [ -n "${{ inputs.batch_size }}" ]; then
              BATCH_ARG="--batch ${{ inputs.batch_size }}"
            fi
          fi

          python scripts/generate_examples.py $LANG_ARG $BATCH_ARG

      - name: Commit generated examples
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.missing != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No new examples generated — nothing to commit."
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "chore: generate example sentences for ${{ steps.check.outputs.missing }} word(s) [skip ci]

          Generated by generate_examples.py using GitHub Models (gpt-4o-mini).

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

            git push
            echo "✅ Pushed example sentences"
          fi
